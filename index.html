<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISCO VISUALIZER</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Anton&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; }

/* Canvas always full screen, always behind everything */
#c {
  position:fixed; top:0; left:0;
  width:100vw; height:100vh;
  display:block;
  z-index:0;
}

/* Every panel sits above the canvas */
.panel {
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  z-index:10;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:'Bebas Neue', sans-serif;
}
.panel.active { display:flex; }

/* LOGIN */
#p-login { background:rgba(0,0,0,0.9); }
.login-box { display:flex; flex-direction:column; align-items:center; gap:18px; width:min(400px,88vw); }
.logo { font-family:'Anton',sans-serif; font-size:clamp(44px,10vw,110px); letter-spacing:0.12em; line-height:1; text-align:center;
  background:linear-gradient(135deg,#ff2d78,#ff9a00,#ffe100,#00f5a0,#00d9f5,#b86bff);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.logo-sub { font-size:clamp(11px,2vw,17px); color:rgba(255,255,255,0.35); letter-spacing:0.35em; }
#login-input {
  width:100%; padding:15px 22px;
  background:rgba(255,255,255,0.08); border:2px solid rgba(255,255,255,0.18);
  color:#fff; font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:0.2em;
  border-radius:12px; outline:none; text-align:center;
}
#login-input:focus { border-color:#ff64c8; }
#login-btn {
  width:100%; padding:16px;
  background:linear-gradient(135deg,#ff2d78,#b86bff);
  color:#fff; font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:0.3em;
  border:none; border-radius:100px; cursor:pointer;
}
#login-btn:hover { filter:brightness(1.1); }
#login-err { font-size:14px; letter-spacing:0.15em; color:#ff4444; min-height:18px; text-align:center; }

/* EDITOR */
#p-editor {
  background:#07030f;
  justify-content:flex-start;
  overflow-y:auto;
  padding:28px 24px 60px;
  align-items:stretch;
}
.ed-h { font-family:'Anton',sans-serif; font-size:clamp(26px,5vw,50px); letter-spacing:0.2em; margin-bottom:20px;
  background:linear-gradient(135deg,#ff2d78,#b86bff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:18px; margin-bottom:14px; }
.lbl { display:block; font-size:11px; letter-spacing:0.22em; color:rgba(255,255,255,0.4); margin-bottom:8px; }
.ei { width:100%; padding:10px 14px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15);
  color:#fff; font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:0.1em;
  border-radius:8px; outline:none; margin-bottom:12px; }
.ei:last-child { margin-bottom:0; }
.ei:focus { border-color:#ff64c8; }
.es { width:100%; padding:10px 14px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15);
  color:#fff; font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:0.1em;
  border-radius:8px; outline:none; cursor:pointer; }
.erow { display:flex; gap:12px; }
.erow .card { flex:1; }
#swatches { display:flex; gap:10px; flex-wrap:wrap; }
.sw { width:30px; height:30px; border-radius:50%; cursor:pointer; border:3px solid transparent; }
.sw.on { border-color:#fff; }
.ebts { display:flex; gap:12px; margin-bottom:14px; }
.ebt { flex:1; padding:14px; font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:0.2em; border:none; border-radius:10px; cursor:pointer; }
#bt-show { background:linear-gradient(135deg,#ff2d78,#b86bff); color:#fff; }
#bt-hide { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:#fff; }
#bt-out { width:100%; padding:10px; background:none; border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.35); font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:0.2em;
  border-radius:8px; cursor:pointer; margin-top:8px; }
#viewers-list { font-size:13px; color:rgba(255,255,255,0.45); letter-spacing:0.1em; }

/* MIC START — sits over canvas */
#p-mic {
  background:rgba(0,0,0,0.88);
  z-index:20;
}
#p-mic.active { display:flex; }
.mic-logo { font-family:'Anton',sans-serif; font-size:clamp(44px,10vw,110px); letter-spacing:0.12em; line-height:1; text-align:center;
  background:linear-gradient(135deg,#ff2d78,#ff9a00,#ffe100,#00f5a0,#00d9f5,#b86bff);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  margin-bottom:12px; }
.mic-sub { font-size:clamp(11px,2vw,17px); color:rgba(255,255,255,0.35); letter-spacing:0.35em; margin-bottom:40px; }
#mic-start {
  padding:16px 60px;
  background:linear-gradient(135deg,#ff2d78,#b86bff);
  color:#fff; font-family:'Bebas Neue',sans-serif; font-size:clamp(16px,2.5vw,26px); letter-spacing:0.3em;
  border:none; border-radius:100px; cursor:pointer;
}
#mic-start:hover { filter:brightness(1.1); }
#mic-err-msg { margin-top:14px; color:#ff4444; font-size:13px; letter-spacing:0.15em; display:none; }

/* HUD */
#hud {
  position:fixed; top:20px; right:22px;
  z-index:30; display:none; gap:8px; flex-wrap:wrap;
}
#hud.on { display:flex; }
.hb { font-family:'Bebas Neue',sans-serif; font-size:12px; letter-spacing:0.2em;
  color:rgba(255,255,255,0.5); background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12); padding:7px 13px; border-radius:6px; cursor:pointer; }
.hb.on, .hb:hover { color:#fff; background:rgba(255,255,255,0.14); border-color:rgba(255,255,255,0.3); }

/* OVERLAY TEXT */
#overlay {
  position:fixed; left:0; right:0;
  z-index:50; pointer-events:none;
  text-align:center; padding:0 5vw;
  display:none;
}
#overlay.pos-centre { top:50%; transform:translateY(-50%); }
#overlay.pos-top    { top:8%; }
#overlay.pos-bottom { bottom:10%; }
.ov-main { font-family:'Anton',sans-serif; font-size:clamp(48px,9vw,130px); letter-spacing:0.08em; line-height:1; display:block; }
.ov-sub  { font-family:'Bebas Neue',sans-serif; font-size:clamp(20px,4vw,56px); letter-spacing:0.3em; display:block; margin-top:10px; }
.col-rainbow .ov-main { color:#fff; text-shadow:0 0 40px #ff64c8,0 0 80px #00d9f5,3px 3px 0 #000; }
.col-rainbow .ov-sub  { color:#ffec40; text-shadow:0 0 20px #ffec40,2px 2px 0 #000; }
.col-white .ov-main, .col-white .ov-sub { color:#fff; text-shadow:0 0 30px rgba(255,255,255,0.8),3px 3px 0 #000; }
.col-gold .ov-main { color:#ffe100; text-shadow:0 0 40px #ff9a00,3px 3px 0 #000; }
.col-gold .ov-sub  { color:#ff9a00; text-shadow:0 0 20px #ff9a00,2px 2px 0 #000; }
.col-pink .ov-main { color:#ff64c8; text-shadow:0 0 40px #ff2d78,3px 3px 0 #000; }
.col-pink .ov-sub  { color:#b86bff; text-shadow:0 0 20px #b86bff,2px 2px 0 #000; }
.col-cyan .ov-main { color:#00f5ff; text-shadow:0 0 40px #00d9f5,3px 3px 0 #000; }
.col-cyan .ov-sub  { color:#00f5a0; text-shadow:0 0 20px #00f5a0,2px 2px 0 #000; }
@keyframes ov-fade  { from{opacity:0} to{opacity:1} }
@keyframes ov-slide-c { from{opacity:0;transform:translateY(calc(-50% + 40px))} to{opacity:1;transform:translateY(-50%)} }
@keyframes ov-slide-t { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes ov-pulse  { 0%,100%{opacity:1} 50%{opacity:0.5} }
@keyframes ov-glitch { 0%,100%{transform:translateY(-50%) skewX(0)} 5%{transform:translateY(-50%) skewX(5deg) translateX(-5px)} 10%{transform:translateY(-50%) skewX(-4deg) translateX(5px)} 15%{transform:translateY(-50%) skewX(0)} }
</style>
</head>
<body>

<!-- ALWAYS VISIBLE CANVAS -->
<canvas id="c"></canvas>

<!-- LOGIN PANEL -->
<div class="panel active" id="p-login">
  <div class="login-box">
    <div class="logo">DISCO<br>VISUALIZER</div>
    <div class="logo-sub">ENTER YOUR USERNAME</div>
    <input id="login-input" type="text" placeholder='type "editor" or "viewer"' autocomplete="off" spellcheck="false">
    <div id="login-err"></div>
    <button id="login-btn">ENTER</button>
  </div>
</div>

<!-- EDITOR PANEL -->
<div class="panel" id="p-editor">
  <div class="ed-h">EDITOR</div>
  <div class="card">
    <label class="lbl">MAIN TEXT</label>
    <input class="ei" id="e-main" type="text" placeholder="e.g. HAPPY BIRTHDAY SARAH" maxlength="60">
    <label class="lbl">SUBTITLE</label>
    <input class="ei" id="e-sub" type="text" placeholder="e.g. Table 3 to the dancefloor!" maxlength="80" style="margin-bottom:0">
  </div>
  <div class="erow">
    <div class="card">
      <label class="lbl">POSITION</label>
      <select class="es" id="e-pos">
        <option value="centre">Centre</option>
        <option value="top">Top</option>
        <option value="bottom">Bottom</option>
      </select>
    </div>
    <div class="card">
      <label class="lbl">ANIMATION</label>
      <select class="es" id="e-anim">
        <option value="fade">Fade</option>
        <option value="slide">Slide Up</option>
        <option value="pulse">Pulse</option>
        <option value="glitch">Glitch</option>
      </select>
    </div>
  </div>
  <div class="card">
    <label class="lbl">COLOUR</label>
    <div id="swatches">
      <div class="sw on" data-c="rainbow" style="background:linear-gradient(135deg,#ff2d78,#ffec40,#00f5a0,#b86bff)"></div>
      <div class="sw" data-c="white"   style="background:#fff"></div>
      <div class="sw" data-c="gold"    style="background:linear-gradient(135deg,#ffe100,#ff9a00)"></div>
      <div class="sw" data-c="pink"    style="background:linear-gradient(135deg,#ff2d78,#b86bff)"></div>
      <div class="sw" data-c="cyan"    style="background:linear-gradient(135deg,#00d9f5,#00f5a0)"></div>
    </div>
  </div>
  <div class="ebts">
    <button class="ebt" id="bt-show">SHOW ON SCREEN</button>
    <button class="ebt" id="bt-hide">HIDE</button>
  </div>
  <div class="card">
    <label class="lbl">CONNECTED VIEWERS</label>
    <div id="viewers-list">—</div>
  </div>
  <button id="bt-out">LOG OUT</button>
</div>

<!-- MIC START (shown over canvas for viewers) -->
<div class="panel" id="p-mic">
  <div class="mic-logo">DISCO<br>VISUALIZER</div>
  <div class="mic-sub">LIVE MUSIC · REAL-TIME · MAINSTAGE</div>
  <button id="mic-start">TAP TO BEGIN</button>
  <div id="mic-err-msg">MIC ACCESS DENIED — CHECK BROWSER SETTINGS</div>
</div>

<!-- HUD (viewer controls) -->
<div id="hud">
  <button class="hb on" data-mode="full">FULL</button>
  <button class="hb" data-mode="bars">BARS</button>
  <button class="hb" data-mode="circle">CIRCLE</button>
  <button class="hb" data-mode="laser">LASER</button>
  <button class="hb" id="fs-btn">⛶ FULLSCREEN</button>
</div>

<!-- OVERLAY (text from editor) -->
<div id="overlay"></div>

<script>
'use strict';

// ═══════════════════════════════════════
// SUPABASE
// ═══════════════════════════════════════
const sb = supabase.createClient(
  'https://rklvtmxjzugcjznxczxa.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJrbHZ0bXhqenVnY2p6bnhjenhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMjk3MTMsImV4cCI6MjA4ODYwNTcxM30.RaAtGYahS1lHT7U7VH8wbbaQ1HHYqO8TBBMMtudfkRg'
);

// ═══════════════════════════════════════
// CANVAS — always running from page load
// ═══════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
});

let tick = 0;
let beatPulse = 0;
let lastBeat = 0;
let mode = 'full';
let audioReady = false;
let analyser, freqData, waveData;

// Persistent viz objects
const PARTICLES = Array.from({length:180}, () => ({
  x:Math.random(), y:0.5+Math.random()*0.5,
  vx:(Math.random()-0.5)*0.003, vy:-(0.001+Math.random()*0.003),
  size:1+Math.random()*3, hue:Math.random()*360,
  life:Math.random(), maxLife:0.6+Math.random()*0.4
}));
const LASERS = Array.from({length:12}, (_,i) => ({
  angle:(i/12)*Math.PI*2,
  speed:(0.008+Math.random()*0.012)*(Math.random()<0.5?1:-1),
  hue:(i/12)*360, width:1.5+Math.random()*2
}));

function detectBeat(bass) {
  const now = performance.now();
  if (bass > 0.55 && now - lastBeat > 220) { beatPulse = 1; lastBeat = now; }
  beatPulse = Math.max(0, beatPulse - 0.04);
}

function getBands() {
  if (!freqData) return {bass:0,mid:0,high:0,sub:0};
  const n = freqData.length;
  const b = (lo,hi) => { let s=0,c=0; for(let i=Math.floor(lo*n);i<Math.floor(hi*n);i++){s+=freqData[i];c++;} return c?s/(c*255):0; };
  return { sub:b(0,.02), bass:b(.02,.06), mid:b(.06,.25), high:b(.25,.65) };
}

function spotBeam(fx, fy, angle, hue, op, cw, len) {
  const g = ctx.createLinearGradient(0,0,0,len);
  g.addColorStop(0,   `hsla(${hue},100%,90%,${op})`);
  g.addColorStop(0.15,`hsla(${hue},100%,72%,${op*0.55})`);
  g.addColorStop(0.5, `hsla(${hue},100%,55%,${op*0.13})`);
  g.addColorStop(1,   'transparent');
  ctx.save(); ctx.translate(fx,fy); ctx.rotate(angle);
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.moveTo(-1,0); ctx.lineTo(1,0); ctx.lineTo(cw,len); ctx.lineTo(-cw,len); ctx.closePath();
  ctx.fill(); ctx.restore();
}

function drawSpotlights(bands) {
  const bright = 0.28 + bands.bass*0.18 + beatPulse*0.12;
  const len = H * 1.9;
  // BG slow faded beams
  [0.38,0.44,0.50,0.56,0.62].forEach((xf,i) => {
    const sway = Math.sin(tick*0.004+i*1.4)*0.15;
    const hue = (tick*0.1+i*30+210)%360, op = 0.06+bands.mid*0.03;
    const g = ctx.createLinearGradient(0,0,0,len);
    g.addColorStop(0,`hsla(${hue},30%,70%,${op})`); g.addColorStop(0.45,`hsla(${hue},25%,55%,${op*0.4})`); g.addColorStop(1,'transparent');
    ctx.save(); ctx.translate(xf*W,0); ctx.rotate(sway);
    ctx.fillStyle=g; ctx.beginPath(); ctx.moveTo(-1,0); ctx.lineTo(1,0); ctx.lineTo(14,len); ctx.lineTo(-14,len); ctx.closePath(); ctx.fill(); ctx.restore();
  });
  [{xf:.46,a:-.18,s:.04,sp:.007},{xf:.40,a:-.30,s:.05,sp:.008},{xf:.33,a:-.44,s:.06,sp:.009}]
    .forEach(({xf,a,s,sp},i)=>spotBeam(xf*W,0,a+Math.sin(tick*sp+i)*s,(tick*0.6+i*45)%360,bright,13,len));
  [{xf:.54,a:.18,s:.04,sp:.007},{xf:.60,a:.30,s:.05,sp:.008},{xf:.67,a:.44,s:.06,sp:.009}]
    .forEach(({xf,a,s,sp},i)=>spotBeam(xf*W,0,a+Math.sin(tick*sp+i+3)*s,(tick*0.6+i*45+180)%360,bright,13,len));
  [{xf:.25,a:-.62,s:.40,sp:.032},{xf:.16,a:-.80,s:.38,sp:.035},{xf:.08,a:-1.0,s:.36,sp:.030},{xf:.02,a:-1.18,s:.32,sp:.038}]
    .forEach(({xf,a,s,sp},i)=>spotBeam(xf*W,0,a+Math.sin(tick*sp+i*0.8)*s,(tick*0.8+i*60+20)%360,bright*1.1,14,len));
  [{xf:.75,a:.62,s:.40,sp:.032},{xf:.84,a:.80,s:.38,sp:.035},{xf:.92,a:1.0,s:.36,sp:.030},{xf:.98,a:1.18,s:.32,sp:.038}]
    .forEach(({xf,a,s,sp},i)=>spotBeam(xf*W,0,a+Math.sin(tick*sp+i*0.8+2)*s,(tick*0.8+i*60+200)%360,bright*1.1,14,len));
  [{yf:.15,a:.18,s:.28,sp:.022},{yf:.33,a:.06,s:.30,sp:.019},{yf:.52,a:-.06,s:.26,sp:.025},{yf:.70,a:-.18,s:.24,sp:.021},{yf:.87,a:-.30,s:.22,sp:.018}]
    .forEach(({yf,a,s,sp},i)=>{
      const fy=yf*H,hue=(tick*0.7+i*55+260)%360,ang=a+Math.sin(tick*sp+i*1.1)*s,sLen=W*1.1,op=0.24+bands.mid*0.14+beatPulse*0.10;
      const g=ctx.createLinearGradient(0,0,0,sLen); g.addColorStop(0,`hsla(${hue},100%,88%,${op})`); g.addColorStop(0.25,`hsla(${hue},100%,72%,${op*0.55})`); g.addColorStop(0.55,`hsla(${hue},100%,55%,${op*0.12})`); g.addColorStop(0.78,'transparent');
      ctx.save(); ctx.translate(0,fy); ctx.rotate(Math.PI/2+ang); ctx.fillStyle=g; ctx.beginPath(); ctx.moveTo(-1,0); ctx.lineTo(1,0); ctx.lineTo(15,sLen); ctx.lineTo(-15,sLen); ctx.closePath(); ctx.fill(); ctx.restore();
    });
  [{yf:.15,a:-.18,s:.28,sp:.022},{yf:.33,a:-.06,s:.30,sp:.019},{yf:.52,a:.06,s:.26,sp:.025},{yf:.70,a:.18,s:.24,sp:.021},{yf:.87,a:.30,s:.22,sp:.018}]
    .forEach(({yf,a,s,sp},i)=>{
      const fy=yf*H,hue=(tick*0.7+i*55+80)%360,ang=a+Math.sin(tick*sp+i*1.1+4)*s,sLen=W*1.1,op=0.24+bands.mid*0.14+beatPulse*0.10;
      const g=ctx.createLinearGradient(0,0,0,sLen); g.addColorStop(0,`hsla(${hue},100%,88%,${op})`); g.addColorStop(0.25,`hsla(${hue},100%,72%,${op*0.55})`); g.addColorStop(0.55,`hsla(${hue},100%,55%,${op*0.12})`); g.addColorStop(0.78,'transparent');
      ctx.save(); ctx.translate(W,fy); ctx.rotate(-Math.PI/2+ang); ctx.fillStyle=g; ctx.beginPath(); ctx.moveTo(-1,0); ctx.lineTo(1,0); ctx.lineTo(15,sLen); ctx.lineTo(-15,sLen); ctx.closePath(); ctx.fill(); ctx.restore();
    });
}

function drawDiscoBall(cx, cy, R, cs) {
  ctx.save(); ctx.strokeStyle='rgba(200,200,200,.3)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(cx,0); ctx.lineTo(cx,cy-R); ctx.stroke(); ctx.restore();
  ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
  const body=ctx.createRadialGradient(cx-R*.3,cy-R*.35,R*.05,cx,cy,R);
  body.addColorStop(0,'rgba(55,55,75,.65)'); body.addColorStop(.55,'rgba(12,12,22,.88)'); body.addColorStop(1,'rgba(0,0,0,.96)');
  ctx.fillStyle=body; ctx.fill(); ctx.restore();
  const glow=ctx.createRadialGradient(cx,cy,R*.4,cx,cy,R*2.2);
  glow.addColorStop(0,`hsla(${cs},60%,80%,${.05+beatPulse*.07})`); glow.addColorStop(1,'transparent');
  ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(cx,cy,R*2.2,0,Math.PI*2); ctx.fill();
  const spin=tick*.045;
  for(let r=1;r<15;r++){
    const phi=(r/15)*Math.PI,sinP=Math.sin(phi),cosP=Math.cos(phi);
    const cols=Math.max(4,Math.round(24*sinP));
    for(let c=0;c<cols;c++){
      const theta=(c/cols)*Math.PI*2+spin+r*.14;
      const sx=sinP*Math.cos(theta),sy=-cosP,sz=sinP*Math.sin(theta);
      if(sz<.02)continue;
      const px=cx+sx*R*.96,py=cy+sy*R*.96,ts=R*.10*(.5+sz*.5),tw=ts*1.25,th=ts*.85;
      const tileHue=(tick*2.5+r*22+c*17)%360,lit=Math.round(48+sz*34),spec=Math.max(0,-sx*.4-sy*.7+sz*.2);
      ctx.save(); ctx.translate(px,py); ctx.rotate(theta*.4+spin*.3);
      ctx.shadowColor='rgba(0,0,0,.75)'; ctx.shadowBlur=3; ctx.shadowOffsetX=1; ctx.shadowOffsetY=1;
      ctx.fillStyle=`hsla(${tileHue},100%,${lit}%,${.55+sz*.45})`; ctx.fillRect(-tw/2,-th/2,tw,th);
      if(spec>.5){ctx.shadowBlur=0;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;ctx.fillStyle=`rgba(255,255,255,${Math.min(.9,(spec-.5)*1.8)})`;ctx.fillRect(-tw*.45,-th*.45,tw*.5,th*.5);}
      ctx.restore();
    }
  }
  const bR=R*.055; ctx.save(); ctx.shadowColor='rgba(255,255,200,.9)'; ctx.shadowBlur=6;
  ctx.beginPath(); ctx.arc(cx,cy,bR,0,Math.PI*2); ctx.fillStyle='rgba(255,255,230,.85)'; ctx.fill(); ctx.restore();
}

function drawBars() {
  const count=120, slotW=W/count, bw=slotW*0.62;
  const usable=Math.floor((freqData||new Uint8Array(2048)).length*0.75), half=Math.floor(count/2);
  const fd = freqData || new Uint8Array(2048);
  for(let i=0;i<count;i++){
    const mirror=i<half?i:count-1-i;
    const bs=Math.floor((mirror/half)*usable),be=Math.floor(((mirror+1)/half)*usable);
    const span=Math.max(1,be-bs); let val=0;
    for(let j=bs;j<bs+span;j++) val+=fd[j]||0;
    val/=(span*255);
    const bh=val*H*0.55, x=i*slotW, hue=(tick*0.3+(i/count)*360+40)%360;
    const g=ctx.createLinearGradient(0,H,0,H-bh);
    g.addColorStop(0,`hsla(${hue},100%,50%,.9)`); g.addColorStop(.6,`hsla(${(hue+40)%360},100%,65%,.8)`); g.addColorStop(1,`hsla(${(hue+80)%360},100%,85%,.6)`);
    ctx.fillStyle=g; ctx.fillRect(x,H-bh,bw,bh);
    if(val>.55){ctx.fillStyle=`hsla(${hue},100%,95%,.95)`;ctx.fillRect(x,H-bh-4,bw,3);}
  }
}

function drawLasers(bands) {
  const cx=W*.5,cy=H*.04;
  for(const l of LASERS){
    l.angle+=l.speed*(1+bands.bass*3); l.hue=(l.hue+.8)%360;
    const len=Math.max(W,H)*2;
    ctx.save(); ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(l.angle)*len,cy+Math.sin(l.angle)*len);
    ctx.strokeStyle=`hsla(${l.hue},100%,70%,${.35+bands.mid*.3})`;
    ctx.lineWidth=l.width+bands.bass*4+beatPulse*3;
    ctx.shadowColor=`hsla(${l.hue},100%,70%,.8)`; ctx.shadowBlur=12;
    ctx.stroke(); ctx.restore();
  }
  ctx.beginPath(); ctx.arc(cx,cy,6+beatPulse*8,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.shadowColor='#fff'; ctx.shadowBlur=20; ctx.fill(); ctx.shadowBlur=0;
}

function drawParticles(bands) {
  for(const p of PARTICLES){
    p.life+=.008+bands.bass*.018;
    if(p.life>p.maxLife){p.x=Math.random();p.y=.85+Math.random()*.15;p.vx=(Math.random()-.5)*.003;p.vy=-(0.002+Math.random()*.005);p.hue=Math.random()*360;p.life=0;p.maxLife=.5+Math.random()*.5;}
    p.x+=p.vx*(1+bands.bass*3); p.y+=p.vy*(1+bands.bass*3);
    const t=p.life/p.maxLife, alpha=t<.1?t*10:(t>.8?(1-t)*5:1);
    ctx.beginPath(); ctx.arc(p.x*W,p.y*H,p.size*(1+beatPulse*.5),0,Math.PI*2);
    ctx.fillStyle=`hsla(${p.hue},100%,75%,${alpha*.7})`; ctx.fill();
  }
}

function drawCircleViz(bands) {
  const cx=W/2,cy=H/2,S=Math.min(W,H),baseR=S*.23,maxBar=S*.38,count=80,cs=(tick*.6)%360;
  // If no audio, generate idle sine wave data so circle always animates
  let fd = freqData;
  if (!fd || !audioReady) {
    fd = new Uint8Array(2048);
    for (let i=0; i<fd.length; i++) {
      fd[i] = Math.floor(80 + 60*Math.sin(tick*0.05 + i*0.08) + 40*Math.sin(tick*0.03 + i*0.15));
    }
  }
  const usable=Math.floor(fd.length*.8), raw=[];
  for(let i=0;i<count;i++){
    const idx=Math.floor((i/count)*usable),span=Math.max(1,Math.floor(usable/count));
    let s=0; for(let j=0;j<span;j++) s+=fd[Math.min(idx+j,fd.length-1)]||0;
    raw.push(s/(span*255));
  }
  const half=raw.slice(0,count/2), mir=[...half,...half.slice().reverse()];
  const vals=mir.map((v,i)=>{const a=mir[(i-2+count)%count],b=mir[(i-1+count)%count],c=mir[(i+1)%count],d=mir[(i+2)%count];return a*.1+b*.2+v*.4+c*.2+d*.1;});
  const avg=vals.reduce((a,b)=>a+b,0)/vals.length;

  const bl=ctx.createRadialGradient(cx,cy,baseR*.3,cx,cy,baseR+maxBar*1.8);
  bl.addColorStop(0,`hsla(${cs},100%,65%,${.08+avg*.18+beatPulse*.10})`); bl.addColorStop(1,'transparent');
  ctx.fillStyle=bl; ctx.beginPath(); ctx.arc(cx,cy,baseR+maxBar*1.8,0,Math.PI*2); ctx.fill();

  const barW=(2*Math.PI*baseR/count)*.72;
  for(let i=0;i<count;i++){
    const v=vals[i],angle=(i/count)*Math.PI*2-Math.PI/2,barLen=Math.max(3,v*maxBar*(1+beatPulse*.55));
    const hue=(cs+(i/count)*360)%360,alpha=.55+v*.45;
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(angle);
    ctx.shadowColor=`hsla(${hue},100%,70%,1)`; ctx.shadowBlur=22+v*12;
    const bw=Math.max(2.5,barW*(.45+v*.75));
    const gr=ctx.createLinearGradient(0,-baseR-barLen,0,-baseR);
    gr.addColorStop(0,`hsla(${hue},100%,92%,1)`); gr.addColorStop(.3,`hsla(${hue},100%,68%,${alpha})`); gr.addColorStop(1,`hsla(${(hue+80)%360},100%,30%,${alpha*.2})`);
    ctx.fillStyle=gr; ctx.beginPath(); ctx.roundRect(-bw/2,-baseR-barLen,bw,barLen,bw/2); ctx.fill(); ctx.shadowBlur=0;
    if(v>.12){ctx.shadowColor=`hsla(${hue},100%,95%,1)`;ctx.shadowBlur=16+v*10;ctx.beginPath();ctx.arc(0,-baseR-barLen,bw*.6,0,Math.PI*2);ctx.fillStyle=`hsla(${hue},100%,98%,${Math.min(1,v*1.8)})`;ctx.fill();ctx.shadowBlur=0;}
    ctx.restore();
  }
  for(let pass=0;pass<3;pass++){
    ctx.save(); ctx.shadowColor=`hsla(${cs},100%,75%,1)`; ctx.shadowBlur=[30,16,8][pass];
    ctx.beginPath(); ctx.arc(cx,cy,baseR,0,Math.PI*2);
    ctx.strokeStyle=`hsla(${cs},100%,78%,${[.35,.55,.85][pass]})`; ctx.lineWidth=[5,3,1.5][pass]; ctx.stroke(); ctx.restore();
  }
  const ig=ctx.createRadialGradient(cx,cy,0,cx,cy,baseR);
  ig.addColorStop(0,`hsla(${(cs+200)%360},50%,10%,.65)`); ig.addColorStop(.55,`hsla(${cs},35%,6%,.55)`); ig.addColorStop(1,'transparent');
  ctx.fillStyle=ig; ctx.beginPath(); ctx.arc(cx,cy,baseR,0,Math.PI*2); ctx.fill();
  drawDiscoBall(cx,cy,baseR*.50,cs);
  if(beatPulse>.1){
    for(let r=0;r<16;r++){
      const a=(r/16)*Math.PI*2+tick*.04,rLen=baseR*.44*beatPulse;
      ctx.save(); ctx.translate(cx,cy); ctx.rotate(a);
      const rg=ctx.createLinearGradient(0,0,0,-rLen); rg.addColorStop(0,`hsla(${(cs+r*22)%360},100%,80%,${beatPulse*.7})`); rg.addColorStop(1,'transparent');
      ctx.strokeStyle=rg; ctx.lineWidth=2; ctx.shadowColor=`hsla(${(cs+r*22)%360},100%,80%,1)`; ctx.shadowBlur=10;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-rLen); ctx.stroke(); ctx.restore();
    }
  }
}

// THE MAIN RENDER LOOP — starts immediately, runs forever
function renderLoop() {
  requestAnimationFrame(renderLoop);
  tick++;

  if (audioReady && analyser) {
    analyser.getByteFrequencyData(freqData);
    analyser.getByteTimeDomainData(waveData);
  }

  const bands = getBands();
  detectBeat(bands.bass);
  const cs = (tick * 0.5) % 360;
  const p = beatPulse * 0.15;
  ctx.fillStyle = `rgb(${Math.round(p*30)},0,${Math.round(p*20)})`;
  ctx.fillRect(0, 0, W, H);

  // Always draw spotlights so screen is never blank
  drawSpotlights(bands);

  if (mode==='full')   { drawParticles(bands); drawLasers(bands); drawDiscoBall(W*.5,H*.18,Math.min(W,H)*(.10+beatPulse*.015),cs); drawBars(); }
  else if (mode==='bars')   { drawDiscoBall(W*.5,H*.18,Math.min(W,H)*(.10+beatPulse*.015),cs); drawBars(); }
  else if (mode==='circle') { drawCircleViz(bands); }
  else if (mode==='laser')  { drawLasers(bands); drawDiscoBall(W*.5,H*.18,Math.min(W,H)*(.10+beatPulse*.015),cs); }
}
renderLoop(); // starts NOW, no conditions

// ═══════════════════════════════════════
// OVERLAY
// ═══════════════════════════════════════
const overlayEl = document.getElementById('overlay');
function applyOverlay(o) {
  if (!o || !o.visible) { overlayEl.style.display='none'; return; }
  overlayEl.innerHTML = (o.main?`<span class="ov-main">${o.main}</span>`:'') + (o.sub?`<span class="ov-sub">${o.sub}</span>`:'');
  overlayEl.className = `pos-${o.pos||'centre'} col-${o.colour||'rainbow'}`;
  overlayEl.style.display = 'block';
  overlayEl.style.animation = 'none'; void overlayEl.offsetWidth;
  const anim = o.anim||'fade', pos = o.pos||'centre';
  if (anim==='fade')   overlayEl.style.animation='ov-fade 0.6s ease forwards';
  if (anim==='slide')  overlayEl.style.animation=pos==='centre'?'ov-slide-c 0.6s ease forwards':'ov-slide-t 0.6s ease forwards';
  if (anim==='pulse')  overlayEl.style.animation='ov-pulse 1.4s ease-in-out infinite';
  if (anim==='glitch') overlayEl.style.animation='ov-glitch 0.6s ease forwards';
}

// ═══════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════
const pLogin  = document.getElementById('p-login');
const pEditor = document.getElementById('p-editor');
const pMic    = document.getElementById('p-mic');
let myRole = null, sbChan = null;

function showPanel(id) {
  [pLogin, pEditor, pMic].forEach(p => p.classList.remove('active'));
  if (id) document.getElementById(id).classList.add('active');
}

function doLogin() {
  const val = document.getElementById('login-input').value.trim().toLowerCase();
  const err = document.getElementById('login-err');
  if (!val) { err.textContent = 'ENTER A USERNAME'; return; }
  if (val !== 'editor' && val !== 'viewer') { err.textContent = 'TYPE "EDITOR" OR "VIEWER"'; return; }
  err.textContent = '';
  myRole = val;
  pLogin.classList.remove('active');
  if (myRole === 'editor') { pEditor.classList.add('active'); initEditor(); }
  else                     { pMic.classList.add('active');    initViewer(); }
  sb.from('users').upsert({username:val,role:val,joined_at:new Date().toISOString()},{onConflict:'username'}).then(()=>{});
  window.addEventListener('beforeunload', doLogout);
}

function doLogout() {
  if (!myRole) return;
  if (sbChan) sb.removeChannel(sbChan);
  sb.from('users').delete().eq('username',myRole).then(()=>{});
  myRole = null;
  pEditor.classList.remove('active');
  pMic.classList.remove('active');
  pLogin.classList.add('active');
  document.getElementById('login-input').value = '';
  document.getElementById('hud').classList.remove('on');
}

document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('login-input').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

// ═══════════════════════════════════════
// EDITOR
// ═══════════════════════════════════════
let edColour = 'rainbow';

function initEditor() {
  document.querySelectorAll('.sw').forEach(s => s.addEventListener('click', () => {
    document.querySelectorAll('.sw').forEach(x=>x.classList.remove('on'));
    s.classList.add('on'); edColour = s.dataset.c;
  }));
  document.getElementById('bt-show').addEventListener('click', pushOverlay);
  document.getElementById('bt-hide').addEventListener('click', hideOverlay);
  document.getElementById('bt-out').addEventListener('click', doLogout);
  document.getElementById('e-main').addEventListener('keydown', e=>{if(e.key==='Enter')pushOverlay();});
  document.getElementById('e-sub').addEventListener('keydown',  e=>{if(e.key==='Enter')pushOverlay();});
  sbChan = sb.channel('ed-users').on('postgres_changes',{event:'*',schema:'public',table:'users'},refreshViewers).subscribe();
  refreshViewers();
  sb.from('overlay').select('*').eq('id',1).single().then(({data})=>{if(data)applyOverlay(data);});
}

function refreshViewers() {
  sb.from('users').select('username').eq('role','viewer').then(({data})=>{
    document.getElementById('viewers-list').textContent = data&&data.length ? data.map(r=>r.username.toUpperCase()).join(', ') : 'NO VIEWERS CONNECTED';
  });
}

async function pushOverlay() {
  const main=document.getElementById('e-main').value.trim(), sub=document.getElementById('e-sub').value.trim();
  if(!main&&!sub) return;
  const o={id:1,main,sub,pos:document.getElementById('e-pos').value,anim:document.getElementById('e-anim').value,colour:edColour,visible:true};
  applyOverlay(o);
  await sb.from('overlay').upsert(o,{onConflict:'id'});
}

async function hideOverlay() {
  applyOverlay({visible:false});
  await sb.from('overlay').upsert({id:1,visible:false},{onConflict:'id'});
}

// ═══════════════════════════════════════
// VIEWER
// ═══════════════════════════════════════
function initViewer() {
  sbChan = sb.channel('vw-overlay')
    .on('postgres_changes',{event:'*',schema:'public',table:'overlay'},payload=>applyOverlay(payload.new))
    .subscribe();
  sb.from('overlay').select('*').eq('id',1).single().then(({data})=>{if(data)applyOverlay(data);});
  document.querySelectorAll('.hb[data-mode]').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.hb[data-mode]').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); mode=b.dataset.mode;
  }));
  document.getElementById('fs-btn').addEventListener('click',()=>{
    if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
    else document.exitFullscreen();
  });
  document.addEventListener('keydown',e=>{
    if(e.key==='f'||e.key==='F') document.getElementById('fs-btn').click();
    if(e.key==='1') document.querySelector('[data-mode="full"]').click();
    if(e.key==='2') document.querySelector('[data-mode="bars"]').click();
    if(e.key==='3') document.querySelector('[data-mode="circle"]').click();
    if(e.key==='4') document.querySelector('[data-mode="laser"]').click();
  });
  document.getElementById('mic-start').addEventListener('click', startMic);
}

async function startMic() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    const audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 4096;
    analyser.smoothingTimeConstant = 0.8;
    audioCtx.createMediaStreamSource(stream).connect(analyser);
    freqData = new Uint8Array(analyser.frequencyBinCount);
    waveData  = new Uint8Array(analyser.fftSize);
    audioReady = true;
    pMic.classList.remove('active');
    document.getElementById('hud').classList.add('on');
  } catch(e) {
    document.getElementById('mic-err-msg').style.display = 'block';
  }
}
</script>
